<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Clínica Odontológica | Arch&Tal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b1c2c;
  color:#eaeaea;
}

/* TIPOGRAFIA */
.brand {
  font-family:'Playfair Display', serif;
  color:#c8a96a;
  letter-spacing:2px;
  margin-bottom:20px;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:clamp(32px,5vw,56px);
  margin-bottom:20px;
  color:#c8a96a;
}

p {
  color:#cfcfcf;
  max-width:600px;
}

/* TRANSIÇÃO */
#swup {
  transition:0.6s cubic-bezier(0.22,1,0.36,1);
}

html.is-animating #swup {
  opacity:0;
  transform:translateY(20px);
}

html.is-leaving #swup {
  opacity:0;
  transform:scale(0.98);
}

/* ANIMAÇÃO */
.reveal {
  opacity:0;
  transform:translateY(60px);
  transition:1.2s cubic-bezier(0.22,1,0.36,1);
}

.reveal.show {
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero {
  height:60vh;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SEÇÃO */
.section {
  padding:80px 20px;
}

.container {
  max-width:900px;
  margin:auto;
}

/* BACK */
.back {
  color:#c8a96a !important;
  text-decoration:none !important;
  font-weight:500;
  display:inline-block;
  margin-bottom:30px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:24px;
  margin-top:40px;
}

/* IMAGENS */
.project img {
  width:100%;
  border-radius:6px;
  transition:0.4s ease;
}

.project img:hover {
  transform:scale(1.03);
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px 18px;
  border-radius:40px;
  font-size:14px;
}

/* MOBILE */
@media(max-width:768px){
  .grid {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div id="swup">

  <div class="hero">
    <img src="render-clinica.jpg">
  </div>

  <div class="section">
    <div class="container">

      <div class="brand">ARCH E TAL</div>

      <a href="index.html" class="back">← Voltar</a>

      <h1 class="reveal">Clínica Odontológica</h1>

      <p class="reveal">
        Projeto comercial focado em conforto, iluminação e identidade profissional.
      </p>

      <div class="grid">

        <div class="project reveal"><img src="render-clinica.jpg"></div>
        <div class="project reveal"><img src="render-clinica.jpg"></div>
        <div class="project reveal"><img src="render-clinica.jpg"></div>
        <div class="project reveal"><img src="render-clinica.jpg"></div>

      </div>

    </div>
  </div>

</div>

<a href="https://wa.me/5522999824550" target="_blank" class="whatsapp">
  Faça seu orçamento
</a>

<script src="https://unpkg.com/swup@4"></script>

<script>
const swup = new Swup();

function initAnimations(){
  const els = document.querySelectorAll('.reveal');

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('show');
      }
    });
  });

  els.forEach(el=>obs.observe(el));
}

initAnimations();

swup.hooks.on('page:view', () => {
  initAnimations();
});
</script>

</body>
</html>
