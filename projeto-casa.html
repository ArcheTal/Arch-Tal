<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Casa Moderna | Arch&Tal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* VARIÁVEIS */
:root {
  --gold:#c8a96a;
  --dark:#0b1c2c;
}

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:var(--dark);
  color:#eaeaea;
}

/* TIPOGRAFIA */
.brand {
  font-family:'Playfair Display', serif;
  font-size:24px;
  letter-spacing:2px;
  color:var(--gold);
  margin-bottom:20px;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:clamp(32px,5vw,56px);
  margin-bottom:20px;
  color:var(--gold);
}

p {
  color:#cfcfcf;
  max-width:600px;
}

/* HERO */
.hero {
  height:60vh;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SEÇÃO */
.section {
  padding:80px 20px;
}

.container {
  max-width:900px;
  margin:auto;
}

/* BOTÃO VOLTAR */
.back {
  display:inline-block;
  margin-bottom:30px;
  color:var(--gold);
  font-weight:500;
  transition:0.3s;
}

.back:hover {
  opacity:0.7;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:24px;
  margin-top:40px;
}

/* IMAGENS */
.project img {
  width:100%;
  border-radius:6px;
  transition:0.4s;
}

.project img:hover {
  transform:scale(1.03);
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px 18px;
  border-radius:40px;
  font-size:14px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* MOBILE */
@media(max-width:768px){
  .grid { grid-template-columns:1fr; }
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="render-casa.jpg">
</div>

<!-- CONTEÚDO -->
<div class="section">
  <div class="container">

    <div class="brand">ARCH E TAL</div>

    <a href="index.html" class="back">
      ← Voltar
    </a>

    <h1>Casa Moderna</h1>

    <p>
      Projeto residencial de alto padrão focado em iluminação natural, materiais e atmosfera.
    </p>

    <div class="grid">

      <div class="project">
        <img src="render-casa.jpg">
      </div>

      <div class="project">
        <img src="render-casa.jpg">
      </div>

      <div class="project">
        <img src="render-casa.jpg">
      </div>

      <div class="project">
        <img src="render-casa.jpg">
      </div>

    </div>

  </div>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/5522999824550" target="_blank" class="whatsapp">
  Faça seu orçamento
</a>

</body>
</html>
